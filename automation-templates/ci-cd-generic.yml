name: CI/CD - Automated Quality Checks (Web)

on:
  push:
    branches: [main, develop, gh-pages]
  pull_request:
    branches: [main, develop]

# Security: Explicitly set minimal permissions
permissions:
  contents: read

jobs:
  # ============================================================================
  # JOB 1: Code Quality & Linting
  # ============================================================================
  code-quality:
    name: 🔍 Code Quality & Linting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for console.log in production code
        run: |
          echo "Checking for console.log statements..."
          if grep -r "console\.log\|console\.debug" src/ *.js *.html --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.git 2>/dev/null | grep -v "// debug:"; then
            echo "❌ ERROR: Found console.log/debug in production code!"
            exit 1
          else
            echo "✅ No console.log found"
          fi

      - name: ESLint (if configured)
        run: |
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ]; then
            npm run lint || true
          else
            echo "⚠️ No ESLint configured, skipping..."
          fi

  # ============================================================================
  # JOB 2: Build Test
  # ============================================================================
  build-web:
    name: 🌐 Build Web
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web
        run: npm run build || echo "No build script found"

      - name: Check dist directory exists
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build output found in dist/"
            SIZE=$(du -sh dist | cut -f1)
            echo "📦 Bundle size: $SIZE"
          else
            echo "⚠️ No dist/ directory found"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: web-build
          path: dist/
          retention-days: 7

  # ============================================================================
  # JOB 3: Version & Compatibility Checks
  # ============================================================================
  version-checks:
    name: 🔧 Version Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          echo "Checking version numbers..."

          PACKAGE_VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "N/A")

          echo "package.json: $PACKAGE_VERSION"

          # Check if version exists in common places
          if grep -q "version.*=.*['\"]" index.html 2>/dev/null; then
            HTML_VERSION=$(grep -o "version.*=.*['\"][0-9.]*['\"]" index.html | head -1)
            echo "index.html: $HTML_VERSION"
          fi

          if grep -q "VERSION.*=.*['\"]" app.js main.js script.js 2>/dev/null; then
            JS_VERSION=$(grep -o "VERSION.*=.*['\"][0-9.]*['\"]" *.js | head -1)
            echo "JS files: $JS_VERSION"
          fi

          echo "✅ Version check complete"

  # ============================================================================
  # JOB 4: Security Audit
  # ============================================================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

      - name: Check for sensitive data
        run: |
          echo "Checking for sensitive data..."

          if grep -ri "api_key\|secret\|password.*=" . --exclude-dir=node_modules --exclude-dir=.git --exclude="*.md" 2>/dev/null | grep -v ".env.example"; then
            echo "⚠️ WARNING: Potential sensitive data found!"
          else
            echo "✅ No obvious sensitive data in code"
          fi

  # ============================================================================
  # JOB 5: Release Readiness Report
  # ============================================================================
  release-checklist:
    name: 📋 Release Readiness
    runs-on: ubuntu-latest
    needs: [code-quality, build-web, version-checks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Generate Release Report
        run: |
          echo "# 🚀 Release Readiness Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Automated Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code Quality" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Web Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Version Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📝 Manual Checks Required" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Test in Chrome" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Test in Safari" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Test on mobile browsers" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Lighthouse audit passed" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] PWA installable (if applicable)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $(node -p "require('./package.json').version" 2>/dev/null || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
