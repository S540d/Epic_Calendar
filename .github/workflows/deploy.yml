name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for web
        run: npm run build:web

      - name: Fix asset paths for GitHub Pages subpath
        run: |
          # Expo Metro baut mit absolutem Pfad-Prefix "/" – für GitHub Pages muss
          # der Repo-Name vorangestellt werden.
          find dist -name "*.html" -exec sed -i 's|src="/_expo/|src="/Epic_Calendar/_expo/|g' {} +
          find dist -name "*.html" -exec sed -i 's|href="/_expo/|href="/Epic_Calendar/_expo/|g' {} +

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Isolierten Worktree für gh-pages anlegen – berührt nie den main-Checkout
          git fetch origin gh-pages || true
          git worktree add /tmp/gh-pages-deploy gh-pages 2>/dev/null \
            || (git worktree add --orphan -b gh-pages /tmp/gh-pages-deploy && true)

          # Alten Inhalt komplett leeren, neuen Build einkopieren
          rm -rf /tmp/gh-pages-deploy/*
          cp -r dist/. /tmp/gh-pages-deploy/
          touch /tmp/gh-pages-deploy/.nojekyll

          cd /tmp/gh-pages-deploy
          git add -A
          git commit -m "chore: deploy from ${{ github.sha }}" || echo "No changes to commit"
          git push origin gh-pages
